<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- White background -->
  <rect width="400" height="400" fill="#FFFFFF"/>
  <!-- Left vertical accent stripe -->
  <rect x="0" y="0" width="8" height="400" fill="#7C3AED"/>

  <!-- Hexagon (purple, flat-top) -->
  <!-- Center: 210,175 radius ~105 -->
  <polygon
    points="210,75 298,127 298,227 210,277 122,227 122,127"
    fill="#7C3AED"
  />

  <!-- Inner network lines (agent nodes) -->
  <line x1="210" y1="75"  x2="210" y2="277" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>
  <line x1="122" y1="127" x2="298" y2="227" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>
  <line x1="298" y1="127" x2="122" y2="227" stroke="#FFFFFF" stroke-width="1.5" opacity="0.35"/>
  <!-- Horizontal cross-lines -->
  <line x1="122" y1="177" x2="298" y2="177" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>

  <!-- Node circles at vertices -->
  <circle cx="210" cy="75"  r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="298" cy="127" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="298" cy="227" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="210" cy="277" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="122" cy="227" r="7" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="122" cy="127" r="7" fill="#FFFFFF" opacity="0.9"/>
  <!-- Center node -->
  <circle cx="210" cy="177" r="9" fill="#FFFFFF"/>

  <!-- "A" letter centered inside hexagon -->
  <text
    x="210" y="205"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="96"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-4"
  >A</text>

  <!-- ATLAS wordmark below hexagon -->
  <text
    x="210" y="318"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="42"
    fill="#0A0A0A"
    text-anchor="middle"
    letter-spacing="10"
  >ATLAS</text>

  <!-- Tagline -->
  <text
    x="210" y="352"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-weight="400"
    font-size="13"
    fill="#5A5A5A"
    text-anchor="middle"
    letter-spacing="1.5"
  >AI AGENT OLYMPICS 2026</text>

  <!-- Small decorative line under wordmark -->
  <rect x="155" y="360" width="110" height="2" fill="#7C3AED"/>
</svg>
